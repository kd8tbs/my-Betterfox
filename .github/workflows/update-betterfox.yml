name: Update Betterfox

on:
  workflow_dispatch:
  schedule:
    - cron: '0 12 * * 1'

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Download latest Betterfox
        run: |
          curl -L https://raw.githubusercontent.com/yokoffing/Betterfox/main/user.js -o user.js

      - name: Append personal overrides
        run: |
          printf '\n\n' >> user.js
          cat overrides.js >> user.js

      - name: Commit changes
        run: |
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'

          git add user.js

          if git diff --staged --quiet; then
            echo 'No changes'
            exit 0
          fi

          git commit -m 'Update Betterfox to latest upstream'
          git push
